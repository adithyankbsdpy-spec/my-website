<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            font-family: Arial;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        .form-box {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
        }

        input, textarea {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        textarea {
            height: 100px;
            resize: none;
        }

        .btn {
            padding: 12px 25px;
            background: #ff4b2b;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        .btn:hover {
            background: #ff416c;
        }

        .popup {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
        }

        .success { background: #28a745; }
        .error { background: #dc3545; }
    </style>
</head>

<body>

<header>
    <h1 style="text-align:center;">Contact</h1>
</header>

<nav>
    <a href="index.html">🏠 Home</a>
    <a href="about.html">📘 About</a>
    <a href="notes.html">📚 Notes</a>
    <a href="login.html">🔐 Dashboard</a>
</nav>

<div class="container">

    <div class="form-box">

        <h2>Send Message 📩</h2>

        <form id="contactForm">

            <!-- ✅ IMPORTANT HIDDEN FIELDS -->
            <input type="hidden" name="_subject" value="New message from website">
            <input type="hidden" name="_template" value="table">

            <input type="text" name="name" placeholder="Enter your name" required>
            <input type="email" name="email" placeholder="Enter your email" required>
            <textarea name="message" placeholder="Enter your message" required></textarea>

            <button class="btn" type="submit">Send</button>

        </form>

    </div>

</div>

<!-- POPUPS -->
<div id="successPopup" class="popup success">✅ Message sent successfully!</div>
<div id="errorPopup" class="popup error">❌ Failed to send!</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let formData = new FormData(this);

    fetch("https://formspree.io/f/xaqaqjvk", {
        method: "POST",
        body: formData,
        headers: {
            'Accept': 'application/json'
        }
    })
    .then(response => {
        if (response.ok) {
            document.getElementById("successPopup").style.display = "block";
            document.getElementById("contactForm").reset();

            setTimeout(() => {
                document.getElementById("successPopup").style.display = "none";
            }, 3000);
        } else {
            document.getElementById("errorPopup").style.display = "block";
        }
    })
    .catch(() => {
        document.getElementById("errorPopup").style.display = "block";
    });
});
</script>

</body>
</html>
